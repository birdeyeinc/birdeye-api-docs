      summary: Search Business
      operationId: Search Business
      description: ''
      tags:
        - Business
      parameters:
        - name: businessNumber
          in: path
          description: Long id of the business, under which user wants to search for.
          required: true
          x-example: '169744180007807'
          type: number
        - name: Accept
          in: header
          description: e.g. application/json
          required: false
          x-example: application/json
          type: string
        - name: x-api-key
          in: header
          description: e.g. [Required] Partner specific API key provided by Birdeye for data exchange.
          required: false
          x-example: '[Required] Partner specific API key provided by Birdeye for data exchange.'
          type: string
        - name: body
          in: body
          schema:
            type: object
            properties:
              searchStr:
                type: string
                description: Search criteria for business. This could be business name or number.
              sortBy:
                type: string
                description: |-
                  Results can be sorted by name, createdAt, and createdBy. By default is createdAt.

                  name : The business name

                  createdAt: The date on which a business/location was created.

                  createdBy: The full name of the user that created the business.
              sortOrder:
                type: string
                description: The SORT order, Possible values "ASC" or "DESC". By default is "DESC".
              startIndex:
                type: number
                description: Once sorted, it defines starting from which index a page (number of specified search results) is to be created.
              pageSize:
                type: number
                description: Determines the number of search results in the response. Users can set a desired value to limit results, e.g., pageSize=25 shows the top 25 business listings. The Default value is 25.
            example:
              pageSize: 25
              searchStr: Thurston Rosenlund
              sortBy: createdAt
              sortOrder: ASC
              startIndex: 0
      produces:
        - application/json
      consumes:
        - application/json
