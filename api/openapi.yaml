      summary: Get All Ticket Data
      operationId: getAllTicketData
      description: Get tickets
      tags:
      - Ticketing
      parameters:
      - name: businessNumber
        in: path
        description: Business number of the account.
        required: true
        example: '169744180007807'
        schema:
          type: number
      - name: op
        in: query
        description: 'Possible values are: [1] will display ticket count only, [3]
          will display all the data of the ticket. Default value - 3.'
        required: true
        example: '3'
        schema:
          type: number
      - name: sIndex
        in: query
        description: Start index of the response. Default value - 0
        required: true
        example: '0'
        schema:
          type: number
      - name: count
        in: query
        description: Number of tickets want to get in the response. Default value
          - 25
        required: true
        example: '25'
        schema:
          type: number
      - name: sortBy
        in: query
        description: Sort options, Possible values [2] will sort on the basis of ticket
          creation date. [3] will sort on the basis of characters of business aliases.
          Default value 2.
        required: true
        example: '2'
        schema:
          type: number
      - name: sortOrder
        in: query
        description: Sort Order [0] will sort the data in ascending order. [1] this
          will sort the data in descending order. Default value - 1
        required: true
        example: '1'
        schema:
          type: number
      - name: totalCount
        in: query
        description: false, total count would not be displayed. true, total count
          would be displayed along with the data of all the tickets. Default Value
          - false
        required: true
        example: true
        schema:
          type: boolean
      - name: Accept
        in: header
        description: e.g. application/json
        required: false
        example: application/json
        schema:
          type: string
          default: application/json
      - name: x-api-key
        in: header
        description: e.g. 2uiHKCTi8hSg35MG75aaot0B2SAokhjk (string, required) - Partner
          specific API key provided by Birdeye for data exchange.
        required: false
        example: 2uiHKCTi8hSg35MG75aaot0B2SAokhjk (string, required) - Partner specific
          API key provided by Birdeye for data exchange.
        schema:
          type: string
      - name: Content-Type
        in: header
        description: Media type of the JSON request body.
        required: false
        example: application/json
        schema:
          type: string
          default: application/json
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/Apiary_getAllTicketData_Request"
            example:
              assignees: []
              businessNumbers: []
              fromDate: 1581230064000
              sourceAliases:
              - ''
              sourceTypes:
              - phone
              - socialmedia
              - chat
              - internal
              tagNames:
              - newReview
              ticketStatuses:
              - assigned
              - new
              ticketTypes:
              - review
              - survey
              - untagged
              toDate: 1707460464000
