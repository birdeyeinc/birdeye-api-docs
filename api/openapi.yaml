swagger: '2.0'
info:
  title: Birdeye
  version: ''
  description: |-
    Birdeye helps businesses grow through happy customers. Over 80,000 businesses use Birdeye everyday to attract new leads with Listings, Reviews and Referrals, convert them into customers with Webchat, Appointments, and Payments, and delight those customers with Surveys, Ticketing, and Insights - all in one place.

    The Birdeye APIs are built on HTTP and are RESTful APIs.

    * Uses resource-oriented URLs.

    * Uses built-in HTTP capabilities for passing parameters and authentication.

    * Responds with standard HTTP response codes to indicate errors.

    * Requests and responses payload attached with all the mentioned APIs, you may choose your preferred language per the integration requirement.

    ### Authentication and Rate limiting

    > __NOTE:__
    > - __All API requests targeting business accounts must include the x-api-key header. This header is required and mandatory for successful authentication and access to the API endpoints.__
    >
    > - __To protect your API key and prevent unauthorized access, please ensure all API requests are made from your backend server. Do not call the APIs directly from the browser or expose your API key in any client-side code.__

    To call a Birdeye API, you need a valid API key. It can be fetched via the Birdeye dashboard and is a confidential key.

    There is a limit to calling APIs with each API key [connect with the support team to get the current limit]. If too many requests are made within the threshold timeframe, an error will be returned in the response.

    ### Pagination

    Multiple API supporting pagination. These APIs have two parameters sindex and count.

    * <b>sindex:</b> is the start index

    * <b>count:</b> No. of records, you want to fetch.

    > __Note__
    > - _Deep Pagination with record window greater than 100k is not supported. Either reduce the sindex + count to be less than equal to 100k or use appropriate filters to narrow down your result set._

    <b>For example :</b>

    * Suppose you have to fetch 20 records:
    <pre><code>
    API call 1 -> sindex=0, count 10
    API call 2 -> sindex -> 10, count 10.
    </pre></code>

    * To fetch 100kth record:
    <pre><code>
    sindex = 99000 and count = 1000
    will just work fine as sindex + count = 100000 which is less than 100,000.
    </pre></code>

    * If you fetch more than 100kth records:
    <pre><code>
    sindex = 99000 and count = 1001, sindex + count = 100001
    which is greater than 100,000. Thus, you'll receive an error in response.
    </pre></code>

    ### HTTP Status Codes

    Every API response will have an HTTP status code.

    * <b>200 - OK:</b> API request is successful

    * <b>202 - Accepted:</b> The API request has been accepted for processing.

    * <b>400 - Bad Request:</b> The API request was unacceptable, often due to a missing or invalid parameter.

    * <b>404 - Not Found:</b> The requested resource does not exist.

    * <b>429 - Rate Limited:</b> You have made too many requests within the threshold timeframe.

    * <b>500 - Internal Server Error:</b> Something went wrong on our end. Please get in touch with support.

    ### Error Response

    Birdeye API will return a validation error in case of missing/invalid input in the request. The response will return the errorCode and errorMessage.

    For example :
    <pre><code>
    {
        "code": 1161,
        "message": "Invalid API key"
    }
    </pre></code>
host: api.birdeye.com
basePath: /resources
schemes:
  - https
paths:
  /v1/signup/reseller/subaccount:
    post:
      responses:
        '200':
          description: OK
          headers: {}
          examples:
            application/json:
              businessId: 653356544
          schema:
            type: object
            properties:
              businessId:
                type: number
                description: Id of the created business
        '400':
          description: Bad Request
          headers: {}
          examples:
            application/json:
              code: 2166
              message: Invalid Business Type
          schema:
            $ref: '#/definitions/2166Model'
        '401':
          description: Unauthorized
          headers: {}
          examples:
            application/json:
              code: 1033
              message: You are not authorized to perform this action
          schema:
            $ref: '#/definitions/1033Model'
        '404':
          description: Not Found
          headers: {}
          examples:
            application/json:
              code: 1010
              message: No user found with the given id
          schema:
            $ref: '#/definitions/1010Model'
        '429':
          description: Too Many Requests
          headers: {}
          examples:
            application/json:
              code: 89
              message: Rate limit exceeded
          schema:
            $ref: '#/definitions/89Model'
      summary: Create a business
      operationId: Create a business
      description: ''
      tags:
        - Business
      parameters:
        - name: rid
          in: query
          description: Id of the Reseller.
          required: true
          x-example: '12334667201'
          type: number
        - name: email_id
          in: query
          description: Business Email id.
          required: true
          x-example: sample@birdeye.com
          type: string
        - name: Accept
          in: header
          description: e.g. application/json
          required: false
          x-example: application/json
          type: string
        - name: x-api-key
          in: header
          description: e.g. [Required] Partner specific API key provided by Birdeye for data exchange.
          required: false
          x-example: '[Required] Partner specific API key provided by Birdeye for data exchange.'
          type: string
        - name: body
          in: body
          schema:
            type: object
            properties:
              businessName:
                type: string
                description: Name of the Business that needs to be added
              zip:
                type: string
                description: Postal code of the business location
              type:
                type: string
                description: |-
                  Type of the Business. Valid values are

                      Business,
                      Enterprise-Location,
                      Enterprise-Product,
                      Reseller
                      or a existing custom hierarchy type. Default is: Business.
              phone:
                type: number
                description: Phone number of the Business.
              entityCategory:
                type: string
                description: |-
                  Specifies the category of the business entity being created or updated. Valid values are:

                  physical_location,provider.
                  physical_location represents a physical office, branch, or storefront location.
                  provider represents an individual practitioner or provider (e.g. doctor, dentist, loan officer) operating within one or more physical locations.
                  If entityCategory is not provided, the entity is created as physical_location by default.
              countryCode:
                type: string
                description: This field is mandatory for non US locations.
              aggrOptions:
                type: number
                description: |-
                  Aggregation Options to enable/disable aggregations. Possible values are [0,1]

                      0 to Disable Search Business
                      1 to Enable Search Business,

                  If aggrOptions is not provided, then Search Business is enabled.
            required:
              - businessName
              - zip
              - phone
            example:
              businessName: The Business Name
              zip: 32323
              type: Business
              phone: '4032365164'
              entityCategory: physical_location
              countryCode: US
              aggrOptions: 1
      produces:
        - application/json
      consumes:
        - application/json
