      summary: Create Survey
      operationId: createSurvey
      description: |-
        Create Survey API helps create a new survey for the required question structure and further displays it on the survey list page.

        <b>Please go through <a href="https://bit.ly/3km4oJi">this document</a> for a detailed explanation of request body fields </b>
      tags:
      - Survey
      parameters:
      - name: businessId
        in: path
        description: Id of the Business.
        required: true
        example: '12345678'
        schema:
          type: string
      - name: Accept
        in: header
        description: e.g. application/json
        required: false
        example: application/json
        schema:
          type: string
          default: application/json
      - name: x-api-key
        in: header
        description: e.g. [Required] Partner specific API key provided by Birdeye
          for data exchange.
        required: false
        example: "[Required] Partner specific API key provided by Birdeye for data
          exchange."
        schema:
          type: string
      - name: Content-Type
        in: header
        description: Media type of the JSON request body.
        required: false
        example: application/json
        schema:
          type: string
          default: application/json
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                surveyName:
                  type: string
                thankYouMessage:
                  type: string
                surveyType:
                  type: string
                ownerEmailId:
                  type: string
                pages:
                  type: array
                  items:
                    type: object
                    properties:
                      questions:
                        type: array
                        items:
                          type: object
                          properties:
                            title:
                              type: string
                            type:
                              type: string
                            required:
                              type: boolean
                            choices:
                              type: array
                              items:
                                type: string
                            minLabel:
                              type: string
                            maxLabel:
                              type: string
                            maxValue:
                              oneOf:
                              - type: number
                              - type: string
                            showTime:
                              type: boolean
                            showDate:
                              type: boolean
                            interval:
                              type: number
                            minValue:
                              type: string
                            contactRows:
                              type: array
                              items:
                                type: object
                                properties:
                                  required:
                                    type: boolean
                                  title:
                                    type: string
                                  type:
                                    type: string
                                required:
                                - required
                                - title
                                - type
                            rows:
                              type: array
                              items:
                                type: string
                            contactUsMessage:
                              type: string
                            reviewSources:
                              type: array
                              items:
                                type: string
                          required:
                          - title
                          - type
                          - choices
                          - minLabel
                          - required
                          - maxValue
                          - maxLabel
                          - rows
                      title:
                        type: string
                    required:
                    - questions
                    - title
              example:
                surveyName: Experience Survey
                thankYouMessage: Thank you for taking the survey!
                surveyType: traditional
                ownerEmailId: testmail@gmail.com
                pages:
                - questions:
                  - title: Text1
                    type: text
                  - title: Paragraph
                    type: textarea
                - title: Page 2-optional
                  questions:
                  - title: Questionnumber1
                    type: checkbox
                    required: true
                    choices:
