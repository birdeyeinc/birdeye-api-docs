              isAddressHidden:
                type: number
                description: If your business doesn’t have a place for your customers to visit, then you can hide your street address. 1 -> hide, 0 -> unhide (Note that this isn’t supported by all sites).
              location:
                type: object
                properties:
                  address1:
                    type: string
                    description: Address of the business/location.
                  address2:
                    type: string
                    description: Address of the business/location.
                  subLocality:
                    type: string
                    description: '(Char 4-80) Mandatory for: New Zealand (Enter the Suburb) Other Countries: This field is not required. Any data entered here for countries outside of New Zealand will be ignored by the system.'
                  city:
                    type: string
                    description: City (Max 1000 character long).
                  state:
                    type: string
                    description: State (2 character state code).
                  countryCode:
                    type: string
                    description: Country Code (2 character country code).
                  zip:
                    type: string
                    description: Zip Code.
                required:
                  - zip
                description: Business address
              emailId:
                type: string
                description: Business Email ID.
              phone:
                type: string
                description: Business Phone (Required) Format is (xxx) xxx-xxxx.
              fax:
                type: string
                description: Fax number Format is (xxx) xxx-xxxx.
              websiteUrl:
                type: string
                description: Business website url.
              establishedYear:
                type: number
                description: Year established
              timezone:
                type: string
                description: Timezone of the business.
              languages:
                type: array
                description: Language.
              isServiceAreaProvider:
                type: string
                description: |-
                  To select whether the business is Service Area Business Type. Default value is : No.

                                Possible values are:
                                              Yes
                                              No
              serviceAreas:
                type: array
                description: Service Area information. You can enter upto 10 service area addresses in one request
              working24x7:
                type: number
                description: Whether business is 24x7 open or not (0-false, 1-true).
              hoursOfOperations:
                type: array
                description: Working hours of business for each day.
              specialHours:
                type: array
                description: Special hours of business.
              businessStatus:
                type: string
                description: The business status on the listing page can be set to Open, Temporarily Closed, Permanently Closed, or Opening Soon. A Reopen Date is mandatory for 'Temporarily Closed' and 'Opening Soon' statuses, while optional for 'Open'.
              reopenDate:
                type: string
                description: Reopen Date is required for the 'Temporarily Closed' and 'Opening Soon' statuses, and optional for 'Open.' The date must be in the 'MM/dd/yyyy' format.
              services:
                type: string
                description: Services (Comma separated list of services offered; used for SEO).
              keywords:
                type: string
                description: Keywords about the business. Useful in SEO. Business keyword cannot be more than 1000 characters.
              products:
                type: string
              appointmentLink:
                type: string
                description: Let customers book appointments by redirecting them to your appointments page.
              reservationLink:
                type: string
                description: Let customers reserve tables by linking them to your reservations page.
              menuLink:
                type: string
                description: Show customers what you serve by linking them to your menu.
              orderAheadLink:
                type: string
                description: Let customers place delivery and pick-up orders by linking them to your ordering page.
              impressum:
                type: string
                description: In certain countries (like Austria, Germany and Switzerland), businesses may be required by law to include a statement of ownership on their web presence.
              payment:
                type: string
                description: Payment Type (Max 250 character long).
              localPhoneNumber:
                type: string
                description: Local phone number.
              tollFreePhoneNumber:
                type: string
                description: Tollfree number.
              androidAppURL:
                type: string
                description: Android app url.
              iosAppURL:
                type: string
                description: IOS app url.
              logoUrl:
                type: string
                description: 'prod.s3.amazonaws.com/669029760/Logo 180 X 121.png (string) - Logo Image. Minimum 250 x 250px. Recommended: 720 X 720 px. 10 KB min.'
              gmbLogoOptOut:
                type: number
                description: Update profile photo on your google my business page. (1-false,0-true).
              fbLogoOptOut:
                type: number
                description: Update profile photo on your facebook profile. (1-false,0-true).
              gmbCoverOptOut:
                type: number
                description: Update cover photo on your google my business page. (1-false,0-true).
              fbCoverOptOut:
                type: number
                description: Update cover photo on your facebook profile. (1-false,0-true).
              coverImageUrl:
                type: string
                description: 'Cover image URL for business displayed on custom review site. Format: JPG, JPEG, PNG. Minimum 1296 x 367px.'
              gmbCover:
                type: string
                description: Google Cover Image Url.
              facebookCover:
                type: string
                description: Facebook Cover Image Url.
              coverBusinessInfoLayout:
                type: string
                description: |-
                  Show on your Birdeye profile. Possible value will be

                      In grid cover image, business info overlay
                      In grid cover image, business info below
                      Full width cover image, business info overlay
                      Full width cover image, business info below
                      Google map view, business info overlay
              covidInfo:
                type: object
                properties:
                  postDescription:
                    type: string
                    description: Post will be update on gmb & FB
                  covid19SupportLink:
                    type: string
                    description: Should be a valid covid19 support url
                  virtualCareLink:
                    type: string
                    description: Should be a valid url virtual care link
                description: Provide covid related update in.
              bingListing:
                type: object
                properties:
                  primaryCategoryBing:
                    type: string
                    description: Primary category of bing.
                  bingPhoneNumber:
                    type: string
                    description: You can provide a phone number which will be pushed only to your Bing listing site and will override the primary phone number set.
                  categories:
                    type: string
                    description: You can add up to 3 categories.
                  bingDescription:
                    type: string
                    description: Bing description cannot be more than 4096 characters.
                description: Provide bing data for listing purpose.
              internalListing:
                type: object
                properties:
                  description:
                    type: string
                    description: Business description cannot be more than 5000 characters.
                  category:
                    type: string
                    description: Primary category of business.
                  subcategory:
                    type: string
                    description: You can add up to 3 subcategories.
                  displayCategory:
                    type: string
                    description: Choose one of the category either from primary category or from sub categories.
                required:
                  - category
                  - subcategory
                description: Provide data for microsite listing purpose.
              facebookListing:
                type: object
                properties:
                  category:
                    type: string
                    description: You can add up to 3 categories.
                  facebookDescription:
                    type: string
                    description: Facebook description cannot be more than 255 characters.
                  facebookPhoneNumber:
                    type: string
                    description: Phone number for facebook profile. This phone number will override the main phone number on your Facebook business page
                description: Provide data for facebook listing purpose.
              gmbListing:
                type: object
                properties:
                  googleWebsiteUrl:
                    type: string
                    description: Website url will update on google listing.
                  googlePhoneNumber:
                    type: string
                    description: You can provide a phone number which will be pushed only to your google listing site and will override the primary phone number set.
                  googleStoreId:
                    type: string
                    description: Store id for google.
                  primaryCategoryGmb:
                    type: string
                    description: Primary category of google.
                  additionalCategory:
                    type: string
                    description: You can add up to 9 subcategories.
                  googleDescription:
                    type: string
                    description: Google description cannot be more than 750 characters.
                  attributes:
                    type: object
                    properties: {}
                    description: |-
                      Google my business attributes are highly visible statements about your business that appear on your Google My Business listing. Supported attributes are

                          Accessibility,Amenities,Crowd,Dining options,Highlights,Planning,Offerings,Health & safety.
                  foodDelivery:
                    type: string
                    description: Enter the redirect URL where customers can place delivery orders.This field is applicable for hospitality business and is category dependent.Example http://www.ubereats.com
                  foodTakeout:
                    type: string
                    description: 'Enter the redirect URL where customers can place ''takeout'' food orders. This field is applicable for hospitality business and is category dependent.Example : http://www.ubereats.com'
                description: Provide data for gmb listing purpose.
              socialProfileURLs:
                type: object
                properties:
                  facebookUrl:
                    type: string
                    description: Facebook URL.
                  twitterUrl:
                    type: string
                    description: Business Twitter URL.
                  linkedInUrl:
                    type: string
                    description: Business LinkedId URL.
                  googleUrl:
                    type: string
                    description: US (string)- Business Google URL.
                  youTubeUrl:
                    type: string
                    description: Business Youtube URL.
                description: Profile URLs for business on top rated social sites
              isSEOEnabled:
                type: boolean
                description: Enable/Disbale search engine indexing of business profile. Valid values are "true","false". Default is "true".
              externalReferenceId:
                type: string
                description: It should be a unique value for location identifier.
              customFields:
                type: object
                properties:
                  type:
                    type: string
                    description: Type of field.
                  fieldValue:
                    type: string
                    description: Custom field value.
                  fieldName:
                    type: string
                    description: Name of custom field (Make sure to enter the same fieldName or else the new field will be created).
                  id:
                    type: number
                    description: fieldId of the custom field created earlier.
                required:
                  - fieldName
                  - id
                description: Custom Field To be Updated
              entityCategory:
                type: string
                description: |-
                  Specifies the category of the business entity being created or updated. Valid values are:

                  physical_location,provider.
                  physical_location represents a physical office, branch, or storefront location.
                  provider represents an individual practitioner or provider (e.g. doctor, dentist, loan officer) operating within one or more physical locations.
                  If entityCategory is not provided, the entity is created as physical_location by default.
            required:
              - emailId
              - phone
              - services
