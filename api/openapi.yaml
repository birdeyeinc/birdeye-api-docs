    Apiary_createTicket_Request:
      type: object
      properties:
        externalId:
          type: number
          description: Public Review Id for which you want to create ticket, Mandatory
            and applicable for creating review ticket.
        assignedTo:
          type: string
          description: EmailId of the user to whom the ticket will be assigned.
        ticketType:
          type: string
          description: 'Type of ticket you want to create. Possible values:'
        customer:
          type: object
          properties:
            emailId:
              type: string
              description: Email id of the customer.
            firstName:
              type: string
              description: First name of the customer.
            lastName:
              type: string
              description: Last name of the customer.
            location:
              type: object
              properties:
                city:
                  type: string
                  description: City of the customer’s location.
                state:
                  type: string
                  description: State of the customer’s location.
              description: Location details of the customer.
            phone:
              type: number
              description: Phone number of the customer.
          description: Customer details for which ticket is created, Mandatory and
            applicable for untagged ticket
        description:
          type: string
          description: Description of the ticket. Applicable for untagged and survey
            ticket
        sourceType:
          type: string
          description: 'Source Type of the ticket. Applicable for untagged ticket
            Possible values:'
        surveyId:
          type: number
          description: Id of the survey for which we want to create a ticket. Applicable
            for survey ticket
        surveyResponseId:
          type: number
          description: Id of the survey response for which we want to create a ticket.
            Applicable for survey ticket
        additionalParams:
          type: array
          description: If you want to create tickets of survey for particular question
            and answer. Applicable for survey ticket
          items:
            type: object
            properties:
              answerId:
                type: number
                description: Id of any of the answers on the survey. Applicable for
                  survey ticket
              questionId:
                type: number
                description: Id of any of the questions on the survey. Applicable
                  for survey ticket
      required:
      - assignedTo
      - ticketType
      example:
        externalId: 3943351204239963000
        assignedTo: pranav.singh@birdeye.com
        ticketType: review
        customer:
          emailId: test+4@yopmail.com
          firstName: Steve
          lastName: Smith
          location:
            city: Dallas
            state: Texas
          phone: ''
        description: Issue with the Store service
        sourceType: internal
