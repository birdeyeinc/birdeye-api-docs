          in: body
          schema:
            type: object
            properties:
              text:
                type: string
                description: |-
                  Input text that will be added in the post. Limits of characters across various Social Sites

                                  Google Business Profile: 1500
                                  Facebook: 5000
                                  Instagram: 5000
                                  LinkedIn: 3000
                                  Twitter: 240
              socialSite:
                type: string
                description: |-
                  The social site where the post will be made. Possible values are

                                  INSTAGRAM,
                                  FACEBOOK,
                                  GOOGLEMYBUSINESS,
                                  LINKEDIN,
                                  TWITTER

                  + Error message: Input SocialSite does not match with any one of the SOCIAL SITE (TWITTER,FACEBOOK, GOOGLEMYBUSINESS,LINKEDIN,INSTAGRAM)
              subBusinessNumbers:
                type: array
                description: List of Location Ids. Optional for SMB.
              scheduleTimestamp:
                type: number
                description: A Unix timestamp in milliseconds that represents the date and time when the post should be scheduled. If not provided, the post will be published after 5 minutes of posting.
