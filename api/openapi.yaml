      type: object
      properties:
        businessName:
          type: string
          description: Name of the Business that needs to be added
        zip:
          type: string
          description: Postal code of the business location
        type:
          type: string
          description: Type of the Business. Valid values are
        phone:
          type: number
          description: Phone number of the Business.
        entityCategory:
          type: string
          description: 'Specifies the category of the business entity being created
            or updated. Valid values are:'
        countryCode:
          type: string
          description: This field is mandatory for non US locations.
        aggrOptions:
          type: number
          description: Aggregation Options to enable/disable aggregations. Possible
            values are [0,1]
      required:
      - businessName
      - zip
      - phone
      example:
        businessName: The Business Name
        zip: 32323
        type: Business
        phone: '4032365164'
        entityCategory: physical_location
        countryCode: US
        aggrOptions: 1
    Apiary_searchBusiness_Request:
      type: object
      properties:
        searchStr:
          type: string
          description: Search criteria for business. This could be business name or
            number.
        sortBy:
          type: string
          description: Results can be sorted by name, createdAt, and createdBy. By
            default is createdAt.
        sortOrder:
          type: string
          description: The SORT order, Possible values "ASC" or "DESC". By default
            is "DESC".
        startIndex:
          type: number
          description: Once sorted, it defines starting from which index a page (number
            of specified search results) is to be created.
        pageSize:
          type: number
          description: Determines the number of search results in the response. Users
            can set a desired value to limit results, e.g., pageSize=25 shows the
            top 25 business listings. The Default value is 25.
      example:
        pageSize: 25
        searchStr: Thurston Rosenlund
        sortBy: createdAt
        sortOrder: ASC
        startIndex: 0
