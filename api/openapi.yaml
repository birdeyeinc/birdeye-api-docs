          schema:
            type: object
            properties:
              businessInfo:
                type: object
                properties:
                  name:
                    type: string
                    description: Name of the Business/Location. Should be Max 1000 characters long.
                  phone:
                    type: string
                    description: Your official Business Phone number. Format is (xxx) xxx-xxxx.
                  websiteUrl:
                    type: string
                    description: Business website url.
                  emailId:
                    type: string
                    description: Business Email ID.
                  isAddressHidden:
                    type: string
                    description: If your business doesn’t have a place for your customers to visit, then you can hide your street address.
                  isServiceAreaProvider:
                    type: string
                    description: If you deliver or provide service at customer locations.
                  mainBusinessDescription:
                    type: string
                    description: Business Description is optional. If this field is included with an empty value in the API request, the existing Business Description will be cleared for the location. If a value is provided, it must contain at least 200 characters. Avoid sending URLs, phone numbers, addresses, or promotional content in this field.
                  serviceAreas:
                    type: array
                    description: 'Locations where you deliver or provide service (applicable if isServiceAreaProvider is ''Yes'').NOTE: Maximum service areas that can be provided are 10.'
                    items: {}
                  location:
                    type: object
                    properties:
                      address1:
                        type: string
                        description: Address of the business.
                      address2:
                        type: string
                        description: Address of the business.
                      city:
                        type: string
                        description: City (Max 1000 character long).
                      state:
                        type: string
                        description: State (2 character state code).
                      countryCode:
                        type: string
                        description: Country Code (2 character country code).
                      zip:
                        type: string
                        description: Zip Code.
                      subLocality:
                        type: string
                        description: '(Char 4-80) Mandatory for: New Zealand (Enter the Suburb) Other Countries: This field is not required. Any data entered here for countries outside of New Zealand will be ignored by the system.'
                    description: Business address
                required:
                  - phone
                description: Business Information
              additionalInfo:
                type: object
                properties:
                  establishedYear:
                    type: number
                    description: Year established
                  timezone:
                    type: string
                    description: Timezone of the business.
                  languages:
                    type: array
                    description: Languages.
                    items: {}
                  moreHours:
                    description: |-
                      Google more hours for specific services you offer such as delivery, takeout, drive-through, and pickup (see: Supported More Hours). Google more hours can only be added if google primary category is added. To get specific types of more hours, please refer to Get supported more hours type api. NOTE: In more hours, day 0 denotes Monday, day 1 denotes Tuesday, …, day 6 denotes Sunday.

                      Please refer /listing/get-more-hours-type/get-more-hours-type api to get google more hours type. Possible Values Breakfast, Lunch, Pickup, etc.
                  appleMoreHours:
                    description: |-
                      Apple more hours for specific services you offer such as Dining, Bar and Delivery. Apple more hours can only be added if apple primary category is added. To get specific types of apple more hours, please refer to Get supported more hours type api.  NOTE: In apple more hours, day 0 denotes Monday, day 1 denotes Tuesday, …, day 6 denotes Sunday.

                      Please refer /listing/get-more-hours-type/get-more-hours-type api to get apple more hours type. Possible Values Service Hours, Delivery Service Hours, Dine In Hours etc.
                  wholeWeekOperating:
                    type: number
                    description: Whether your business is open 24/7, Possible Values - 0 or 1.
                  hoursOfOperations:
                    type: array
                    description: 'Regular hours: Regular working hours of the business for each day from Monday to Sunday.'
                    items: {}
                  specialHours:
                    type: array
                    description: For special holiday days, where you may have limited hours of operation and don’t want to change your preset regular hours. These would only be applicable only for the dates they are set for.
                    items: {}
                  businessStatus:
                    type: string
                    description: The business status on the listing page can be set to Open, Temporarily Closed, Permanently Closed, or Opening Soon. A Reopen Date is mandatory for 'Temporarily Closed' and 'Opening Soon' statuses, while optional for 'Open'.
                  reopenDate:
                    type: string
                    description: Reopen Date is required for the 'Temporarily Closed' and 'Opening Soon' statuses, and optional for 'Open.' The date must be in the 'MM/dd/yyyy' format.
                  services:
                    type: string
                    description: Services offered by the business. Useful in SEO. (Comma separated list of services offered) Business services cannot be more than 1000 characters.
                  keywords:
                    type: string
                    description: Important keywords related to the business. Useful in SEO. (Comma separated list of important keywords) Business keywords cannot be more than 1000 characters.
                  products:
                    type: string
                    description: Products about the business. Useful in SEO and Business products cannot be more than 1000 characters.
                  appointmentLink:
                    type: string
                    description: Let customers book appointments by redirecting them to your appointments page.
                  reservationLink:
                    type: string
                    description: Let customers reserve tables by linking them to your reservations page.
                  menuLink:
                    type: string
                    description: Show customers what you serve by linking them to your menu.
                  orderAheadLink:
                    type: string
                    description: Let customers place delivery and pick-up orders by linking them to your ordering page.
                  impressum:
                    type: string
                    description: In certain countries (like Austria, Germany and Switzerland), businesses may be required by law to include a statement of ownership on their web presence.
                  paymentTypes:
                    description: |-
                      List of payment types accepted by the business.

                      + (Members)
                          + China Union Pay
                          + Bitcoin
                          + Cash Accepted
                          + MasterCard
                          + PayPal
                          + Check / Cheque
                          + Contactless Payment
                          + Debit Card
                          + Diners Club
                          + JCB
                          + Financing
                          + Visa
                          + American Express
                          + Cash Only
                          + Rupay
                          + Credit Card
                          + Discover
                  additionalPaymentTypes:
                    type: string
                    description: Additional Payment Type (Max 250 character long).
                  localPhoneNumber:
                    type: string
                    description: Local phone number.
                  tollFreePhoneNumber:
                    type: string
                    description: Tollfree number.
                  androidAppURL:
                    type: string
                    description: Android app url.
                  iosAppURL:
                    type: string
                    description: IOS app url.
