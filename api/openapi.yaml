      summary: Get Reviews
      operationId: getReviews
      description: |-
        Get Reviews returns reviews for a business account with detailed review fields.

        > __Behavior Note__
        > - _If `statuses` is not provided, the API defaults to `["published"]`, which returns featured reviews only._
        > - _Status mapping: `published` = featured reviews, `parked` = non-featured reviews._
        > - _To fetch both featured and non-featured reviews, pass `statuses: ["published","parked"]` or `statuses: ["all"]` in the request body._
        > - _`ratings` filters are applied only within the statuses selected for the request._

        > __Note__
        > - _Deep Pagination with record window greater than 100k is not supported. Either reduce the sindex + count to be less than equal to 100k or use appropriate filters to narrow down your result set._
      tags:
      - Reviews
      parameters:
      - name: businessId
        in: path
        description: Id of the Business.
        required: true
        example: '12345678'
        schema:
          type: number
      - name: sindex
        in: query
        description: Start index of the reviews. Refer API note for max permissible
          value.
        required: true
        example: '10'
        schema:
          type: integer
      - name: count
        in: query
        description: Number of reviews to query. Refer API note for max permissible
          value.
        required: true
        example: '30'
        schema:
          type: integer
      - name: includeNonAggregatedReviews
        in: query
        description: Include Reviews whose auto-crawling is blocked e.g. PressGaney
        required: false
        example: 'false'
        schema:
          type: boolean
      - name: Accept
        in: header
        description: e.g. application/json
        required: false
        example: application/json
        schema:
          type: string
          default: application/json
      - name: x-api-key
        in: header
        description: e.g. [Required] Partner specific API key provided by Birdeye
          for data exchange.
        required: false
        example: "[Required] Partner specific API key provided by Birdeye for data
          exchange."
        schema:
          type: string
      - name: Content-Type
        in: header
        description: Media type of the JSON request body.
        required: false
        example: application/json
        schema:
          type: string
          default: application/json
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fromDate:
                  type: string
                  description: Review date start in UTC format.
                toDate:
                  type: string
                  description: Review date end in UTC format, eg if toDate is 04/01/2013,
                    reviews of date 04/01/2013 is excluded .
                fromTimestamp:
                  type: number
                  description: Review start date in milliseconds, pass either fromDate
                    or fromTimestamp.
                toTimestamp:
                  type: number
                  description: Review end date in milliseconds, pass either endDate
                    or toTimestamp.
                updateFromDate:
                  type: string
                  description: Review updated date start in UTC format.
                updateToDate:
                  type: string
                  description: Review updated date end in UTC format.
                sources:
                  type: string
                  description: 'Aggregation source name Note: use "our_website" to
                    filter reviews posted on Birdeye platform or use "direct_feedback"
                    for direct feedback.'
                ratings:
                  type: array
                  description: Review rating Possible values 0,1,2,3,4,5.
                  items: {}
                searchStr:
                  type: string
                  description: String that is contained by review.
                subBusinessIds:
                  type: array
                  description: BusinessIds under enterprise account.
                  items: {}
                statuses:
                  type: array
                  description: Review status filter. Valid values are "published",
                    "parked", and "all". If omitted, default is "published" only (featured
                    reviews). "published" refers to featured reviews and "parked"
                    refers to non-featured reviews.
                  items: {}
                allChild:
                  type: boolean
                  description: Get review from all child ignoring merge reviews flag
                    configured at parent/child relationship level.
                tags:
                  type: array
                  description: Reviews with assigned tags
                  items: {}
                fetchExtraParams:
                  type: boolean
                  description: To fetch custom field(s) associated with the customer
                    attributed to the review [if any].
                needCustomerInfo:
                  type: boolean
                  description: To fetch customer information associated with the reviewer
                    [if attributed].
                fetchAssitedByDetails:
                  type: boolean
                  description: To retrieve employees associated with the review [if
                    mapped].
              example:
                fromTimestamp: 1712986782000
                toTimestamp: 1715578782000
                updateFromDate: 04/01/2013
                updateToDate: 05/3/2015
                sources:
                - google
                - citysearch
                ratings:
                - 1
                - 2
                - 3
                - 4
                - 5
                - 0
                searchStr: test string
                subBusinessIds:
                - 12345678
                - 1232111
                - 1231231321
                statuses:
                - all
                allChild: 'true'
                tags:
                - positive
                - negative
                fetchExtraParams: false
                needCustomerInfo: false
                fetchAssitedByDetails: true
            example:
              fromTimestamp: 1712986782000
              toTimestamp: 1715578782000
              updateFromDate: 04/01/2013
              updateToDate: 05/3/2015
              sources:
              - google
              - citysearch
              ratings:
              - 1
              - 2
              - 3
              - 4
              - 5
              - 0
              searchStr: test string
              subBusinessIds:
              - 12345678
              - 1232111
              - 1231231321
              statuses:
              - all
              allChild: 'true'
              tags:
              - positive
              - negative
              fetchExtraParams: false
              needCustomerInfo: false
              fetchAssitedByDetails: true
