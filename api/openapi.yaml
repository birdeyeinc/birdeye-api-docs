      summary: Create a business
      operationId: createABusiness
      description: Create a business API creates a new business under a reseller.
      tags:
      - Business
      parameters:
      - name: rid
        in: query
        description: Id of the Reseller.
        required: true
        example: '12334667201'
        schema:
          type: number
      - name: email_id
        in: query
        description: Business Email id.
        required: true
        example: sample@birdeye.com
        schema:
          type: string
      - name: Accept
        in: header
        description: e.g. application/json
        required: false
        example: application/json
        schema:
          type: string
          default: application/json
      - name: x-api-key
        in: header
        description: e.g. [Required] Partner specific API key provided by Birdeye
          for data exchange.
        required: false
        example: "[Required] Partner specific API key provided by Birdeye for data
          exchange."
        schema:
          type: string
      - name: Content-Type
        in: header
        description: Media type of the JSON request body.
        required: false
        example: application/json
        schema:
          type: string
          default: application/json
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/Apiary_createABusiness_Request"
            example:
              businessName: The Business Name
              zip: 32323
              type: Business
              phone: '4032365164'
              entityCategory: physical_location
              countryCode: US
              aggrOptions: 1
