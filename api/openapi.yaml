      summary: Get All Ticket Data
      operationId: Get All Ticket Data
      description: ''
      tags:
        - Ticketing
      parameters:
        - name: businessNumber
          in: path
          description: Business number of the account.
          required: true
          x-example: '169744180007807'
          type: number
        - name: op
          in: query
          description: 'Possible values are: [1] will display ticket count only, [3] will display all the data of the ticket. Default value - 3.'
          required: true
          x-example: '3'
          type: number
        - name: sIndex
          in: query
          description: Start index of the response. Default value - 0
          required: true
          x-example: '0'
          type: number
        - name: count
          in: query
          description: Number of tickets want to get in the response. Default value - 25
          required: true
          x-example: '25'
          type: number
        - name: sortBy
          in: query
          description: Sort options, Possible values [2] will sort on the basis of ticket creation date. [3] will sort on the basis of characters of business aliases. Default value 2.
          required: true
          x-example: '2'
          type: number
        - name: sortOrder
          in: query
          description: Sort Order [0] will sort the data in ascending order. [1] this will sort the data in descending order. Default value - 1
          required: true
          x-example: '1'
          type: number
        - name: totalCount
          in: query
          description: ''
          required: true
          x-example: 'true'
          type: string
        - name: Accept
          in: header
          description: e.g. application/json
          required: false
          x-example: application/json
          type: string
        - name: x-api-key
          in: header
          description: e.g. 2uiHKCTi8hSg35MG75aaot0B2SAokhjk (string, required) - Partner specific API key provided by Birdeye for data exchange.
          required: false
          x-example: 2uiHKCTi8hSg35MG75aaot0B2SAokhjk (string, required) - Partner specific API key provided by Birdeye for data exchange.
          type: string
        - name: body
          in: body
          schema:
            type: object
            properties:
              assignees:
                type: array
                description: List of assignee email id.
              businessNumbers:
                type: array
                description: List of Location Business Numbers.
              fromDate:
                type: number
                description: Epoc start date.
              toDate:
                type: number
                description: Epoc end date.
              sourceAliases:
                type: array
                description: Source alias.
              sourceTypes:
                type: array
                description: Source Type.
              tagNames:
                type: array
                description: Tag assigned to any review ticket.
              ticketStatuses:
                type: array
                description: Filter tickets with status.
              ticketTypes:
                type: array
                description: |-
                  List of ticket type, Possible values

                                                      review,
                                                      untagged,
                                                      survey
            example:
              assignees: []
              businessNumbers: []
              fromDate: 1581230064000
              sourceAliases:
                - ''
              sourceTypes:
                - phone
                - socialmedia
                - chat
                - internal
              tagNames:
                - newReview
              ticketStatuses:
                - assigned
                - new
              ticketTypes:
                - review
                - survey
                - untagged
              toDate: 1707460464000
      produces:
        - application/json
      consumes:
        - application/json
